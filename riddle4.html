<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>חידה 4 - חפש את המטמון</title>
  <link rel="stylesheet" href="./src/styles/main.css">
  <style>
    .riddle-header {
      text-align: center;
      margin-bottom: var(--spacing-xl);
    }
    
    .riddle-number {
      display: inline-block;
      width: 60px;
      height: 60px;
      line-height: 60px;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
      border-radius: 50%;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: var(--spacing-md);
    }
    
    .pyramid-wrapper {
      margin: var(--spacing-xl) 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .pyramid-row {
      display: flex;
      justify-content: center;
      margin-bottom: var(--spacing-sm);
      gap: var(--spacing-xs);
    }
    
    .pyramid-cell {
      width: 50px;
      height: 50px;
      border: 2px solid var(--border-color);
      border-radius: var(--border-radius);
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .pyramid-cell input {
      width: 100%;
      height: 100%;
      border: none;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      background: transparent;
      font-family: var(--font-family-hebrew);
    }
    
    .pyramid-cell.answer {
      background: #d1fae5;
      border-color: var(--primary-color);
      border-width: 3px;
    }
    
    .clue-number {
      position: absolute;
      top: 2px;
      right: 4px;
      font-size: 0.7rem;
      color: var(--text-secondary);
      z-index: 1;
      font-weight: 600;
    }
    
    .clues-section {
      margin-top: var(--spacing-xl);
      padding: var(--spacing-lg);
      background: var(--bg-secondary);
      border-radius: var(--border-radius);
    }
    
    .clue-item {
      padding: var(--spacing-sm);
      margin-bottom: var(--spacing-sm);
      display: flex;
      justify-content: flex-start;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      direction: rtl;
      gap: var(--spacing-sm);
    }
    
    .clue-item .clue-number {
      font-weight: 600;
    }
    
    .clue-item .clue-text {
      text-align: right;
    }
    
    .clue-item:last-child {
      border-bottom: none;
    }
    
    .answer-row {
      display: flex;
      gap: var(--spacing-sm);
      margin: var(--spacing-xl) 0;
      justify-content: center;
      flex-direction: row-reverse; /* RTL for Hebrew */
    }
    
    .answer-cell {
      width: 60px;
      height: 60px;
      border: 3px solid var(--primary-color);
      border-radius: var(--border-radius);
      background: #d1fae5;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .answer-cell input {
      width: 100%;
      height: 100%;
      border: none;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      background: transparent;
      font-family: var(--font-family-hebrew);
    }
    
    .instruction-text {
      text-align: center;
      color: var(--text-secondary);
      margin-bottom: var(--spacing-lg);
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="riddle-header">
        <div class="riddle-number">4</div>
        <h2>חידה רביעית</h2>
        <p class="instruction-text">פתרי את החידה לפי הרמזים. המילה האחרונה היא התשובה (בסדר הפוך)</p>
      </div>
      
      <div class="pyramid-wrapper">
        <!-- Row 1: 2 letters -->
        <div class="pyramid-row">
          <div class="pyramid-cell">
            <span class="clue-number">1</span>
            <input type="text" maxlength="1" id="r1c1">
          </div>
          <div class="pyramid-cell">
            <input type="text" maxlength="1" id="r1c2">
          </div>
        </div>
        
        <!-- Row 2: 3 letters -->
        <div class="pyramid-row">
          <div class="pyramid-cell">
            <span class="clue-number">2</span>
            <input type="text" maxlength="1" id="r2c1">
          </div>
          <div class="pyramid-cell">
            <input type="text" maxlength="1" id="r2c2">
          </div>
          <div class="pyramid-cell">
            <input type="text" maxlength="1" id="r2c3">
          </div>
        </div>
        
        <!-- Row 3: 4 letters -->
        <div class="pyramid-row">
          <div class="pyramid-cell">
            <span class="clue-number">3</span>
            <input type="text" maxlength="1" id="r3c1">
          </div>
          <div class="pyramid-cell">
            <input type="text" maxlength="1" id="r3c2">
          </div>
          <div class="pyramid-cell">
            <input type="text" maxlength="1" id="r3c3">
          </div>
          <div class="pyramid-cell">
            <input type="text" maxlength="1" id="r3c4">
          </div>
        </div>
        
        <!-- Row 4: 5 letters (answer row) -->
        <div class="pyramid-row">
          <div class="pyramid-cell answer">
            <span class="clue-number">4</span>
            <input type="text" maxlength="1" id="r4c1">
          </div>
          <div class="pyramid-cell answer">
            <input type="text" maxlength="1" id="r4c2">
          </div>
          <div class="pyramid-cell answer">
            <input type="text" maxlength="1" id="r4c3">
          </div>
          <div class="pyramid-cell answer">
            <input type="text" maxlength="1" id="r4c4">
          </div>
          <div class="pyramid-cell answer">
            <input type="text" maxlength="1" id="r4c5">
          </div>
        </div>
      </div>
      
      <div class="clues-section">
        <h3>רמזים:</h3>
        <div class="clue-item">
          <span class="clue-number">1.</span>
          <span class="clue-text">חיית בקר</span>
        </div>
        <div class="clue-item">
          <span class="clue-number">2.</span>
          <span class="clue-text">נשיא המדינה</span>
        </div>
        <div class="clue-item">
          <span class="clue-number">3.</span>
          <span class="clue-text">אבן יסוד המתמטיקה</span>
        </div>
        <div class="clue-item">
          <span class="clue-number">4.</span>
          <span class="clue-text">גזוזטרה</span>
        </div>
      </div>
      
      <div class="answer-row">
        <div class="answer-cell">
          <input type="text" maxlength="1" id="answer1" class="answer-input">
        </div>
        <div class="answer-cell">
          <input type="text" maxlength="1" id="answer2" class="answer-input">
        </div>
        <div class="answer-cell">
          <input type="text" maxlength="1" id="answer3" class="answer-input">
        </div>
        <div class="answer-cell">
          <input type="text" maxlength="1" id="answer4" class="answer-input">
        </div>
        <div class="answer-cell">
          <input type="text" maxlength="1" id="answer5" class="answer-input">
        </div>
      </div>
      
      <div id="alert-container"></div>
      
      <div class="text-center mt-4">
        <button onclick="checkAnswer()" class="btn btn-primary btn-large">
          בדוק תשובה ✅
        </button>
      </div>
    </div>
  </div>
  
  <script type="module">
    import { validateRiddle1 } from './src/js/riddles.js';
    
    // Get all inputs
    const answerInputs = [
      document.getElementById('answer1'),
      document.getElementById('answer2'),
      document.getElementById('answer3'),
      document.getElementById('answer4'),
      document.getElementById('answer5'),
    ];
    
    const pyramidRow4Inputs = [
      document.getElementById('r4c1'),
      document.getElementById('r4c2'),
      document.getElementById('r4c3'),
      document.getElementById('r4c4'),
      document.getElementById('r4c5'),
    ];
    
    // Sync answer row with pyramid row 4 (bidirectional)
    function syncAnswerRow() {
      // Pyramid to Answer: when pyramid row 4 changes, update answer row
      pyramidRow4Inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
          answerInputs[4 - index].value = e.target.value;
        });
        
        // Also sync on paste
        input.addEventListener('paste', () => {
          setTimeout(() => {
            answerInputs[4 - index].value = input.value;
          }, 0);
        });
      });
      
      // Answer to Pyramid: when answer row changes, update pyramid row 4
      answerInputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
          pyramidRow4Inputs[4-index].value = e.target.value;
        });
        
        // Also sync on paste
        input.addEventListener('paste', () => {
          setTimeout(() => {
            pyramidRow4Inputs[4-index].value = input.value;
          }, 0);
        });
      });
    }
    
    // Collect all inputs in visual reading order (RTL: right to left, top to bottom)
    // Note: answer row has flex-direction: row-reverse, so visually answerInputs[0] is on the right
    const allInputsInOrder = [
      // Row 1 (rightmost to leftmost)
      document.getElementById('r1c1'),
      document.getElementById('r1c2'),
      // Row 2
      document.getElementById('r2c1'),
      document.getElementById('r2c2'),
      document.getElementById('r2c3'),
      // Row 3
      document.getElementById('r3c1'),
      document.getElementById('r3c2'),
      document.getElementById('r3c3'),
      document.getElementById('r3c4'),
      // Row 4 (answer row in pyramid)
      ...pyramidRow4Inputs,
      // Answer row (visually right to left due to row-reverse: answer5 is visually rightmost)
      ...answerInputs.reverse(),
    ];
    
    // Set tab indexes in reading order (RTL: rightmost = 1, leftmost = highest)
    allInputsInOrder.forEach((input, index) => {
      if (input) {
        input.tabIndex = index + 1;
      }
    });
    
    // Reverse answerInputs back to original DOM order for other uses
    answerInputs.reverse();
    
    // Auto-advance function for any input list
    function setupAutoAdvance(inputs) {
      inputs.forEach((input, index) => {
        if (!input) return;
        
        input.addEventListener('input', (e) => {
          if (e.target.value && index < inputs.length - 1) {
            // Move to next input in the list
            inputs[index + 1].focus();
          }
        });
        
        // Handle backspace to go to previous input
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !e.target.value && index > 0) {
            e.preventDefault();
            inputs[index - 1].focus();
          }
        });
      });
    }
    
    // Make checkAnswer available globally
    window.checkAnswer = function() {
      const answers = answerInputs.map(input => input.value);
      
      const alertContainer = document.getElementById('alert-container');
      
      if (validateRiddle1(answers)) {
        alertContainer.innerHTML = '<div class="alert alert-success">✅ נכון! מעבר לחידה הבאה...</div>';
        setTimeout(() => {
          window.location.href = 'riddle5.html';
        }, 1500);
      } else {
        alertContainer.innerHTML = '<div class="alert alert-error">❌ תשובה שגויה. נסי שוב!</div>';
        // Clear all inputs
        answerInputs.forEach(input => input.value = '');
        pyramidRow4Inputs.forEach(input => input.value = '');
      }
    };
    
    // Initialize
    syncAnswerRow();
    
    // Setup auto-advance for individual rows
    setupAutoAdvance([
      document.getElementById('r1c1'),
      document.getElementById('r1c2'),
    ]);
    setupAutoAdvance([
      document.getElementById('r2c1'),
      document.getElementById('r2c2'),
      document.getElementById('r2c3'),
    ]);
    setupAutoAdvance([
      document.getElementById('r3c1'),
      document.getElementById('r3c2'),
      document.getElementById('r3c3'),
      document.getElementById('r3c4'),
    ]);
    setupAutoAdvance(pyramidRow4Inputs);
    
    // Setup auto-advance for answer row
    // Answer row has flex-direction: row-reverse, so visually the order is reversed:
    // Visually: answer5 (right) -> answer4 -> answer3 -> answer2 -> answer1 (left)
    // DOM order: answer1, answer2, answer3, answer4, answer5
    // So we need to reverse the auto-advance logic
    const answerInputsReversed = [...answerInputs].reverse();
    answerInputs.forEach((input, domIndex) => {
      if (!input) return;
      
      // Find the visual index (reversed)
      const visualIndex = answerInputs.length - 1 - domIndex;
      
      input.addEventListener('input', (e) => {
        if (e.target.value && visualIndex < answerInputsReversed.length - 1) {
          // Move to next input visually (leftward in RTL)
          const nextVisualIndex = visualIndex + 1;
          const nextDomIndex = answerInputs.length - 1 - nextVisualIndex;
          answerInputs[nextDomIndex].focus();
        }
      });
      
      // Handle backspace to go to previous input (visually rightward)
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && visualIndex > 0) {
          e.preventDefault();
          const prevVisualIndex = visualIndex - 1;
          const prevDomIndex = answerInputs.length - 1 - prevVisualIndex;
          answerInputs[prevDomIndex].focus();
        }
      });
    });
    
    // Auto-focus first input (rightmost, top)
    document.getElementById('r1c1').focus();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>חידה 2 - חפש את המטמון</title>
  <link rel="stylesheet" href="./src/styles/main.css">
  <style>
    .riddle-header {
      text-align: center;
      margin-bottom: var(--spacing-xl);
    }

    .riddle-number {
      display: inline-block;
      width: 60px;
      height: 60px;
      line-height: 60px;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
      border-radius: 50%;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: var(--spacing-md);
    }

    .secret-box {
      background: var(--bg-secondary);
      border: 2px solid var(--border-color);
      border-radius: var(--border-radius-lg);
      padding: var(--spacing-lg);
      margin: var(--spacing-xl) 0;
      overflow-x: hidden;
    }

    .cipher-grid {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
    }

    .cipher-row {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: var(--spacing-md);
      direction: rtl;
    }

    .cipher-row.wide-word-gap {
      gap: calc(var(--spacing-md) + 28px);
    }

    .cipher-word {
      display: flex;
      gap: var(--spacing-sm);
      direction: rtl;
    }

    .cipher-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-xs);
    }

    .cipher-cell input {
      width: 50px;
      height: 50px;
      border: 2px solid var(--border-color);
      border-radius: var(--border-radius);
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      font-family: var(--font-family-hebrew);
      background: white;
    }

    .cipher-cell input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgb(99 102 241 / 0.1);
    }

    .cipher-symbol {
      font-size: 1.5rem;
      line-height: 1;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-md);
    }

    .legend-item {
      background: white;
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      padding: var(--spacing-sm);
      text-align: center;
      font-weight: 600;
    }

    .secret-hint {
      text-align: center;
      color: var(--text-secondary);
      margin-bottom: var(--spacing-md);
      font-size: 0.95rem;
    }

    @media (max-width: 768px) {
      .secret-box {
        padding: var(--spacing-md);
      }

      .cipher-row {
        gap: var(--spacing-sm);
      }

      .cipher-row.wide-word-gap {
        gap: calc(var(--spacing-sm) + 6px);
      }

      .cipher-word {
        gap: var(--spacing-xs);
      }

      .cipher-cell input {
        width: 40px;
        height: 40px;
        font-size: 1.2rem;
      }

      .cipher-symbol {
        font-size: 1.25rem;
      }
    }

    @media (max-width: 480px) {
      .secret-box {
        padding: var(--spacing-sm);
      }

      .cipher-row {
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .cipher-row.wide-word-gap {
        gap: 30px;
      }

      .cipher-word {
        gap: 3px;
      }

      .cipher-cell input {
        width: 28px;
        height: 28px;
        font-size: 0.95rem;
        border-radius: 8px;
      }

      .cipher-symbol {
        font-size: 0.95rem;
      }

      .legend {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .legend-item {
        font-size: 0.9rem;
      }

      .secret-hint {
        font-size: 0.85rem;
      }
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="riddle-header">
        <div class="riddle-number">2</div>
        <h2>חידה שנייה</h2>
        <p>כל אות הוחלפה בסימן. מלאי אות מעל כל סימן</p>
      </div>

      <div class="secret-box">
        <div id="cipher-grid" class="cipher-grid"></div>
        <p class="secret-hint">אות זהה = אותו סימן. אות סופית משתמשת בסימן של האות הרגילה.</p>

        <div id="legend" class="legend"></div>
      </div>

      <div id="alert-container"></div>

      <div class="text-center mt-4">
        <button onclick="checkAnswer()" class="btn btn-primary btn-large">
          בדוק תשובה ✅
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { validateRiddle6 } from './src/js/riddles.js';

    const CIPHER_ROWS = [
      ['מתחת', 'לעלים'],
      ['של', 'עץ'],
      ['האבוקדו'],
    ];
    const LETTER_TO_SYMBOL = {
      מ: '◆',
      ת: '◇',
      ח: '▲',
      ל: '△',
      ע: '●',
      י: '○',
      ש: '□',
      צ: '★',
      א: '☆',
      ב: '✦',
      ו: '✧',
      ק: '✪',
      ד: '✿',
      ה: '✸',
    };

    const letterInputs = [];

    function normalizeLetter(letter) {
      const finalToRegular = {
        ך: 'כ',
        ם: 'מ',
        ן: 'נ',
        ף: 'פ',
        ץ: 'צ',
      };
      return finalToRegular[letter] || letter;
    }

    function renderCipher() {
      const cipherGrid = document.getElementById('cipher-grid');
      let charIndex = 0;

      CIPHER_ROWS.forEach((rowWords) => {
        const rowEl = document.createElement('div');
        rowEl.className = 'cipher-row';
        if (rowWords.length === 2 && rowWords.every((word) => word.length === 2)) {
          rowEl.classList.add('wide-word-gap');
        }

        rowWords.forEach((word) => {
          const wordEl = document.createElement('div');
          wordEl.className = 'cipher-word';

          [...word].forEach((char) => {
            const cell = document.createElement('div');
            cell.className = 'cipher-cell';

            const input = document.createElement('input');
            input.type = 'text';
            input.maxLength = 1;
            input.dataset.index = charIndex.toString();
            input.setAttribute('aria-label', `אות ${charIndex + 1}`);
            letterInputs.push(input);

            const symbol = document.createElement('span');
            symbol.className = 'cipher-symbol';
            symbol.textContent = LETTER_TO_SYMBOL[normalizeLetter(char)];

            cell.appendChild(input);
            cell.appendChild(symbol);
            wordEl.appendChild(cell);
            charIndex += 1;
          });

          rowEl.appendChild(wordEl);
        });

        cipherGrid.appendChild(rowEl);
      });

      const legend = document.getElementById('legend');
      Object.entries(LETTER_TO_SYMBOL).forEach(([letter, symbol]) => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.textContent = `${symbol} = ${letter}`;
        legend.appendChild(item);
      });

      letterInputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
          if (e.target.value && index < letterInputs.length - 1) {
            letterInputs[index + 1].focus();
          }
        });

        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !e.target.value && index > 0) {
            e.preventDefault();
            letterInputs[index - 1].focus();
          }
        });
      });

      if (letterInputs.length > 0) {
        letterInputs[0].focus();
      }
    }

    window.checkAnswer = function() {
      const answerLetters = letterInputs.map((input) => input.value);
      const alertContainer = document.getElementById('alert-container');

      if (validateRiddle6(answerLetters)) {
        alertContainer.innerHTML = '<div class="alert alert-success">🎉 נכון! מעבר לחידה הבאה...</div>';
        setTimeout(() => {
          window.location.href = 'riddle3.html';
        }, 1500);
      } else {
        alertContainer.innerHTML = '<div class="alert alert-error">❌ תשובה שגויה. נסי שוב!</div>';
      }
    };

    renderCipher();
  </script>
</body>
</html>
